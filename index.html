<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Investment Memo Assistant</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f3; min-height: 100vh; padding: 2rem 1rem; }
    .container { max-width: 720px; margin: 0 auto; }
    .header { margin-bottom: 2rem; }
    .header h1 { font-size: 24px; font-weight: 600; color: #1a1a1a; margin-bottom: 4px; }
    .header p { font-size: 15px; color: #666; }
    .card { background: white; border-radius: 12px; border: 1px solid #e5e5e5; padding: 1.5rem; margin-bottom: 1.5rem; }
    label { display: block; font-size: 12px; font-weight: 500; color: #888; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
    input, select, textarea { width: 100%; padding: 10px 12px; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 15px; font-family: inherit; color: #1a1a1a; background: #fafafa; outline: none; transition: border 0.2s; }
    input:focus, select:focus, textarea:focus { border-color: #888; background: white; }
    textarea { resize: vertical; min-height: 90px; line-height: 1.6; }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .btn { width: 100%; padding: 12px; font-size: 16px; font-weight: 500; background: #1a1a1a; color: white; border: none; border-radius: 8px; cursor: pointer; transition: background 0.2s; }
    .btn:hover { background: #333; }
    .btn:disabled { background: #ccc; cursor: not-allowed; }
    .output { display: none; background: white; border-radius: 12px; border: 1px solid #e5e5e5; padding: 1.5rem; margin-top: 1.5rem; }
    .output h2 { font-size: 16px; font-weight: 600; color: #1a1a1a; margin-bottom: 1rem; padding-bottom: 0.75rem; border-bottom: 1px solid #f0f0f0; }
    .memo-text { font-size: 14px; line-height: 1.9; color: #2a2a2a; white-space: pre-wrap; }
    .copy-btn { margin-top: 1rem; padding: 8px 16px; font-size: 13px; background: white; border: 1px solid #e0e0e0; border-radius: 6px; cursor: pointer; color: #555; }
    .copy-btn:hover { background: #f5f5f5; }
    .loading { color: #888; font-size: 14px; font-style: italic; }
    .error { color: #c0392b; font-size: 14px; }
    @media (max-width: 600px) { .field-row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Investment Memo Assistant</h1>
      <p>Fill in the company details and get a draft memo in seconds.</p>
    </div>
    <div class="card">
      <div class="field-row">
        <div class="field">
          <label>Company name</label>
          <input type="text" id="company" placeholder="e.g. Acme Corp" />
        </div>
        <div class="field">
          <label>Industry / sector</label>
          <input type="text" id="industry" placeholder="e.g. B2B SaaS" />
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Annual revenue</label>
          <input type="text" id="revenue" placeholder="e.g. €12M" />
        </div>
        <div class="field">
          <label>Deal stage</label>
          <select id="stage">
            <option value="">Select...</option>
            <option>Early stage (Series A/B)</option>
            <option>Growth stage (Series C+)</option>
            <option>Buyout / LBO</option>
            <option>Distressed / turnaround</option>
            <option>Growth equity</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label>What does the company do?</label>
        <textarea id="description" placeholder="e.g. Acme provides workflow automation software to mid-market manufacturers across Europe. 200 customers, 90% gross margins."></textarea>
      </div>
      <div class="field">
        <label>Why is this an interesting investment?</label>
        <textarea id="thesis" placeholder="e.g. Growing 40% YoY, fragmented market, strong recurring revenue, founder-led with no institutional capital yet."></textarea>
      </div>
      <button class="btn" onclick="generateMemo()">Generate investment memo</button>
    </div>
    <div class="output" id="output">
      <h2>Draft investment memo</h2>
      <div class="memo-text" id="memoText"></div>
      <button class="copy-btn" onclick="copyMemo()">Copy memo</button>
    </div>
  </div>
  <script>
    async function generateMemo() {
      const company = document.getElementById('company').value.trim();
      const industry = document.getElementById('industry').value.trim();
      const revenue = document.getElementById('revenue').value.trim();
      const stage = document.getElementById('stage').value;
      const description = document.getElementById('description').value.trim();
      const thesis = document.getElementById('thesis').value.trim();
      if (!company || !description) { alert('Please fill in at least the company name and description.'); return; }
      const btn = document.querySelector('.btn');
      const output = document.getElementById('output');
      const memoText = document.getElementById('memoText');
      btn.disabled = true;
      btn.textContent = 'Generating...';
      output.style.display = 'block';
      memoText.className = 'memo-text loading';
      memoText.textContent = 'Your AI analyst is drafting the memo...';
      try {
        const response = await fetch('/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ company, industry, revenue, stage, description, thesis })
        });
        const data = await response.json();
        if (data.error) throw new Error(data.error);
        memoText.className = 'memo-text';
        memoText.textContent = data.memo;
      } catch (err) {
        memoText.className = 'memo-text error';
        memoText.textContent = 'Something went wrong. Please try again.';
      }
      btn.disabled = false;
      btn.textContent = 'Regenerate memo';
    }
    function copyMemo() {
      const text = document.getElementById('memoText').textContent;
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.querySelector('.copy-btn');
        btn.textContent = 'Copied!';
        setTimeout(() => btn.textContent = 'Copy memo', 2000);
      });
    }
  </script>
</body>
</html>
